<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>-3W Booking Dashboard</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;color:#202124}
.login-wrap{display:flex;justify-content:center;align-items:center;height:100vh;background:#f0f2f5}
.login-box{background:#fff;padding:40px;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.1);text-align:center}
.login-box h2{color:#1a73e8;margin-bottom:8px}
.login-box p{color:#5f6368;margin-bottom:24px}
.error{color:#ea4335;margin-top:12px;display:none}
#app{display:none}
.header{background:linear-gradient(135deg,#1a73e8,#1557b0);padding:10px 20px;color:#fff;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:18px;font-weight:700}
.header .info{font-size:12px;opacity:.7}
.header .user{font-size:12px;cursor:pointer;opacity:.8}
.header .user:hover{opacity:1}
.filters{background:#fff;padding:8px 20px;border-bottom:1px solid #dadce0;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.filters label{font-size:12px;color:#5f6368;white-space:nowrap}
.filters select{padding:4px 8px;border:1px solid #dadce0;border-radius:4px;font-size:13px;min-width:70px}
.filters .sep{width:16px}
.tabs{display:flex;gap:0;background:#fff;border-bottom:1px solid #dadce0;padding:0 20px}
.tabs .tab{padding:10px 16px;font-size:13px;cursor:pointer;border-bottom:3px solid transparent;color:#5f6368}
.tabs .tab.active{color:#1a73e8;border-bottom-color:#1a73e8;font-weight:600}
.content{padding:16px 20px}
.row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.card{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);padding:16px;flex:1;min-width:120px}
.card .label{font-size:11px;color:#5f6368;margin-bottom:4px}
.card .value{font-size:22px;font-weight:700;color:#202124}
.card .delta{font-size:12px;margin-left:4px}
.card .delta.pos{color:#34a853}
.card .delta.neg{color:#ea4335}
.chart-row{display:flex;gap:12px;margin-bottom:12px}
.chart-card{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);padding:16px}
.chart-card h3{font-size:14px;font-weight:600;margin-bottom:8px}
.chart-card .sub{font-size:11px;color:#5f6368}
table.summary{width:100%;border-collapse:collapse;font-size:11px}
table.summary th{background:#e8f0fe;padding:4px 6px;text-align:center;border:1px solid #dadce0;font-weight:600;white-space:nowrap}
table.summary td{padding:4px 6px;text-align:center;border:1px solid #dadce0;white-space:nowrap}
table.summary tr.total{font-weight:700;background:#f0f4ff}
table.summary tr.total-m{font-weight:700;background:#e8edf5}
table.summary td.lbl{text-align:left;font-weight:600;background:#fafafa}
.loading{text-align:center;padding:60px;color:#5f6368;font-size:16px}
</style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="login">
<div class="login-box">
  <h2>-3W Booking Dashboard</h2>
  <p>회사 Google 계정으로 로그인하세요</p>
  <button onclick="doLogin()" style="padding:10px 24px;background:#1a73e8;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:15px;display:flex;align-items:center;gap:8px;margin:0 auto">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Google 계정으로 로그인
  </button>
  <p class="error" id="loginErr"></p>
</div>
</div>

<!-- App -->
<div id="app">
<div class="header">
  <div style="display:flex;align-items:center;gap:12px">
    <h1>-3W Booking Dashboard</h1>
    <button onclick="toggleLang()" id="langBtn" style="background:rgba(255,255,255,.25);color:#fff;border:1px solid rgba(255,255,255,.5);padding:4px 12px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600">EN</button>
    <a href="guide.html" style="background:rgba(255,255,255,.15);color:#fff;font-size:12px;text-decoration:none;padding:4px 12px;border-radius:4px;border:1px solid rgba(255,255,255,.3)" id="guideLink">📖 Guide</a>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <select id="dataDateSel" onchange="loadHistoricalData()" style="padding:3px 6px;border-radius:4px;font-size:11px;border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.15);color:#fff">
      <option value="today">Loading...</option>
    </select>
    <span class="user" id="userInfo" onclick="logout()"></span>
  </div>
</div>

<div class="filters">
  <label>팀</label><select id="fTeam"><option value="ALL">전체</option></select>
  <label>선적지</label><select id="fOri"><option value="ALL">전체</option></select>
  <label>선적포트</label><select id="fOriP"><option value="ALL">전체</option></select>
  <label>도착지</label><select id="fDst"><option value="ALL">전체</option></select>
  <label>도착포트</label><select id="fDstP"><option value="ALL">전체</option></select>
  <div class="sep"></div>
  <label>보기</label><select id="fView"><option value="dest">도착지별</option><option value="origin">선적지별</option></select>
  <label>월</label><select id="fMonth"></select>
  <label>주차</label><select id="fWeek"><option value="ALL">전체</option></select>
  <label>화주구분</label><select id="fProfit"><option value="ALL">전체</option><option value="hi">고수익화주</option><option value="lo">저수익화주</option></select>
  <label>등급</label><select id="fGrade"><option value="ALL">전체</option><option value="ab">A+B</option><option value="cd">C+D</option></select>
  <label>영업사원</label><select id="fSales"><option value="ALL">전체</option></select>
</div>

<div class="tabs">
  <div class="tab active" data-tab="t1" onclick="switchTab('t1')">① 소석률 현황</div>
  <div class="tab" data-tab="t2" onclick="switchTab('t2')">② 부킹 트렌드</div>
  <div class="tab" data-tab="t3" onclick="switchTab('t3')">③ 전환 퍼널</div>
  <div class="tab" data-tab="t4" onclick="switchTab('t4')">④ 수익성</div>
  <div class="tab" data-tab="t5" onclick="switchTab('t5')">⑤ 부킹 패턴</div>
</div>

<div class="content">
  <div class="loading" id="loading">데이터 로딩 중...</div>
  <div id="tabContent"></div>
</div>
</div>

<script>
// ═══════════════════════════════════════════════
// Auth (OAuth2 implicit redirect flow)
// ═══════════════════════════════════════════════
const GOOGLE_CLIENT_ID = '409330651463-giie223egsskdq10etn642gjtron1hq5.apps.googleusercontent.com';
const ALLOWED_DOMAINS = ['ekmtc.com'];
const SCOPES = 'email profile openid';
const DRIVE_FOLDER_ID = '1JIxg6Y-_gRfI1HueXZ1Q9j4-Z5bxvNgv';
const REDIRECT_URI = location.origin + '/kmtc-3w-dashboard-web/';

let gToken = null, gUser = null, DATA = null;

function doLogin() {
  const authUrl = 'https://accounts.google.com/o/oauth2/v2/auth' +
    '?client_id=' + encodeURIComponent(GOOGLE_CLIENT_ID) +
    '&redirect_uri=' + encodeURIComponent(REDIRECT_URI) +
    '&response_type=token' +
    '&scope=' + encodeURIComponent(SCOPES) +
    '&include_granted_scopes=true' +
    '&prompt=select_account';
  location.href = authUrl;
}

function handleRedirect() {
  const hash = location.hash.substring(1);
  if (!hash) return false;
  const params = new URLSearchParams(hash);
  const token = params.get('access_token');
  if (!token) return false;

  // Clear hash from URL
  history.replaceState(null, '', location.pathname);

  // Get user info and verify domain
  fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
    headers: {'Authorization': 'Bearer ' + token}
  }).then(r => r.json()).then(info => {
    const domain = (info.email || '').split('@')[1] || '';
    if (ALLOWED_DOMAINS.length && !ALLOWED_DOMAINS.includes(domain.toLowerCase())) {
      document.getElementById('loginErr').style.display = 'block';
      document.getElementById('loginErr').textContent = `${domain} 도메인은 접근할 수 없습니다.`;
      return;
    }
    gToken = token;
    gUser = {email: info.email, name: info.name, picture: info.picture};
    sessionStorage.setItem('gtoken', token);
    sessionStorage.setItem('guser', JSON.stringify(gUser));
    showApp();
  }).catch(e => {
    document.getElementById('loginErr').style.display = 'block';
    document.getElementById('loginErr').textContent = L('사용자 정보 확인 실패: ','Failed to verify user: ') + e.message;
  });
  return true;
}

function checkSession() {
  // 1. Check redirect callback
  if (handleRedirect()) return;
  // 2. Check existing session
  const t = sessionStorage.getItem('gtoken');
  const u = sessionStorage.getItem('guser');
  if (t && u) {
    gToken = t; gUser = JSON.parse(u);
    fetch('https://www.googleapis.com/oauth2/v1/tokeninfo?access_token=' + t)
      .then(r => { if (r.ok) showApp(); else sessionStorage.clear(); })
      .catch(() => sessionStorage.clear());
  }
}

function logout() {
  sessionStorage.clear();
  location.reload();
}

function showApp() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('userInfo').textContent = `${gUser.name} | ${L('로그아웃','Logout')}`;
  loadData();
}

// ═══════════════════════════════════════════════
// Data Loading + Historical Data
// ═══════════════════════════════════════════════
let _driveFiles = {}; // {date: fileId}

async function loadData() {
  try {
    const resp = await fetch('data.json?t=' + Date.now());
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    DATA = await resp.json();
    normalizeMetricKeys(DATA);
    const sel = document.getElementById('dataDateSel');
    sel.innerHTML = `<option value="today">${DATA.data_date} (${L('최신','Latest')})</option>`;
    initFilters();
    document.getElementById('loading').style.display = 'none';
    render();
    // Load available dates from Drive in background
    loadDriveFileList();
  } catch(e) {
    document.getElementById('loading').textContent = `${L('데이터 로드 실패','Data load failed')}: ${e.message}`;
  }
}

async function loadDriveFileList() {
  if (!gToken) return;
  try {
    const r = await fetch(`https://www.googleapis.com/drive/v3/files?q='${DRIVE_FOLDER_ID}'+in+parents+and+name+contains+'dashboard_summary_2'&fields=files(id,name)&orderBy=name+desc&pageSize=30`, {
      headers: {'Authorization': 'Bearer ' + gToken}
    });
    if (!r.ok) return;
    const files = (await r.json()).files || [];
    const sel = document.getElementById('dataDateSel');
    const today = DATA.data_date;
    files.forEach(f => {
      const m = f.name.match(/dashboard_summary_(\d{8})\.json/);
      if (m && m[1] !== today) {
        _driveFiles[m[1]] = f.id;
        const d = m[1];
        const label = `${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}`;
        sel.innerHTML += `<option value="${d}">${label}</option>`;
      }
    });
  } catch(e) { /* silent */ }
}

async function loadHistoricalData() {
  const sel = document.getElementById('dataDateSel');
  const val = sel.value;
  if (val === 'today') {
    // Reload current data
    document.getElementById('loading').style.display = 'block';
    document.getElementById('loading').textContent = L('최신 데이터 로딩...','Loading latest...');
    const resp = await fetch('data.json?t=' + Date.now());
    DATA = await resp.json();
    normalizeMetricKeys(DATA);
    document.getElementById('loading').style.display = 'none';
    initFilters(); render();
    return;
  }
  const fileId = _driveFiles[val];
  if (!fileId || !gToken) return;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('loading').textContent = `${L('과거 데이터 로딩','Loading historical')}: ${val}...`;
  try {
    const resp = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
      headers: {'Authorization': 'Bearer ' + gToken}
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    DATA = await resp.json();
    normalizeMetricKeys(DATA);
    document.getElementById('loading').style.display = 'none';
    initFilters(); render();
  } catch(e) {
    document.getElementById('loading').textContent = `${L('로드 실패','Load failed')}: ${e.message}`;
  }
}

function normalizeMetricKeys(data) {
  const renameMap = {
    norm_fst: 'norm_lst',
    w3_norm_fst: 'w3_norm_lst',
    w3_hi_norm_fst: 'w3_hi_norm_lst',
    w3_ab_norm_fst: 'w3_ab_norm_lst',
    w3_cd_norm_fst: 'w3_cd_norm_lst',
    w2_norm_fst: 'w2_norm_lst',
    w1_norm_fst: 'w1_norm_lst',
    wos_norm_fst: 'wos_norm_lst'
  };
  ['monthly', 'weekly', 'shipper'].forEach(section => {
    (data[section] || []).forEach(row => {
      Object.entries(renameMap).forEach(([oldKey, newKey]) => {
        if (Object.prototype.hasOwnProperty.call(row, oldKey)) {
          if (!Object.prototype.hasOwnProperty.call(row, newKey)) row[newKey] = row[oldKey];
          delete row[oldKey];
        }
      });
    });
  });
  deriveHighProfitMetrics(data, 'monthly');
  deriveHighProfitMetrics(data, 'weekly');
}

function deriveHighProfitMetrics(data, section) {
  if (!Array.isArray(data[section])) return;
  const needsHiFst = data[section].some(row => !Object.prototype.hasOwnProperty.call(row, 'hi_fst'));
  const needsHiNormLst = data[section].some(row => !Object.prototype.hasOwnProperty.call(row, 'hi_norm_lst'));
  if (!needsHiFst && !needsHiNormLst) return;
  const keyFields = section === 'weekly'
    ? ['team','origin','ori_port','dest','dst_port','YYYYMM','week_start_date']
    : ['team','origin','ori_port','dest','dst_port','YYYYMM'];
  const hiFstByKey = {};
  const hiNormLstByKey = {};
  (data.shipper || []).forEach(row => {
    if (row['\uace0\uc218\uc775\ud0dc\uadf8'] !== '고수익화주') return;
    const k = keyFields.map(f => row[f] ?? '').join('|');
    hiFstByKey[k] = (hiFstByKey[k] || 0) + (row.fst || 0);
    hiNormLstByKey[k] = (hiNormLstByKey[k] || 0) + (row.norm_lst || 0);
  });
  data[section].forEach(row => {
    const k = keyFields.map(f => row[f] ?? '').join('|');
    if (needsHiFst && !Object.prototype.hasOwnProperty.call(row, 'hi_fst')) row.hi_fst = hiFstByKey[k] || 0;
    if (needsHiNormLst && !Object.prototype.hasOwnProperty.call(row, 'hi_norm_lst')) row.hi_norm_lst = hiNormLstByKey[k] || 0;
  });
}

// ═══════════════════════════════════════════════
// Filters
// ═══════════════════════════════════════════════
function initFilters() {
  const teams = [...new Set(DATA.monthly.map(r=>r.team))].sort();
  fillSelect('fTeam', teams);
  // 기본 월: 현재 주 + 3주 후의 월
  const _now = new Date();
  const _sun = new Date(_now); _sun.setDate(_now.getDate() - _now.getDay()); // 이번주 일요일
  const _target = new Date(_sun); _target.setDate(_sun.getDate() + 21); // +3주
  const _defMonth = `${_target.getFullYear()}${String(_target.getMonth()+1).padStart(2,'0')}`;
  const defMonth = DATA.months.includes(_defMonth) ? _defMonth : DATA.months[DATA.months.length-1];
  fillSelect('fMonth', DATA.months, defMonth);
  updateCascade();
  updateWeekOpts();
  // 기본 주차: 전체 (월 전체 실적 표시)
  ['fTeam','fOri','fOriP','fDst','fDstP','fView','fProfit','fGrade','fSales'].forEach(id =>
    document.getElementById(id).addEventListener('change', () => { updateCascade(); render(); }));
  document.getElementById('fMonth').addEventListener('change', () => { updateWeekOpts(); updateCascade(); render(); });
  document.getElementById('fWeek').addEventListener('change', () => { render(); });
}

function fillSelect(id, vals, def) {
  const el = document.getElementById(id);
  const cur = el.value;
  const opts = ['<option value="ALL">' + L('전체','All') + '</option>'];
  vals.forEach(v => opts.push(`<option value="${v}">${fmtMonth(v)}</option>`));
  el.innerHTML = opts.join('');
  el.value = def || (vals.includes(cur) ? cur : 'ALL');
}

function fmtMonth(v) {
  const m = v.match(/^(\d{4})(\d{2})$/);
  if (!m) return v;
  const mi = parseInt(m[2]);
  if (_lang === 'en') {
    const names = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return names[mi] || mi;
  }
  return `${mi}월`;
}

function gv(id) { return document.getElementById(id).value; }

function updateCascade() {
  let d = DATA.monthly;
  const team=gv('fTeam'), ori=gv('fOri'), oriP=gv('fOriP'), dst=gv('fDst'), dstP=gv('fDstP'), sales=gv('fSales');
  if(team!=='ALL') d=d.filter(r=>r.team===team);
  fillSelect('fOri', [...new Set(d.map(r=>r.origin))].sort(), ori);
  if(ori!=='ALL') d=d.filter(r=>r.origin===ori);
  
  // 선적포트 옵션: Monthly + BSA 데이터 모두에서 추출
  let oriPOpts = [...new Set(d.map(r=>r.ori_port))];
  if(DATA.bsa) {
    let b = DATA.bsa;
    if(team!=='ALL') b=b.filter(r=>r.team===team);
    if(ori!=='ALL') b=b.filter(r=>r.origin===ori);
    const bsaOriPorts = [...new Set(b.map(r=>r.POR_PORT))];
    oriPOpts = [...new Set([...oriPOpts, ...bsaOriPorts])];
  }
  fillSelect('fOriP', oriPOpts.sort(), oriP);
  if(oriP!=='ALL') d=d.filter(r=>r.ori_port===oriP);
  
  // 도착지 옵션: Monthly + BSA 데이터 모두에서 추출
  let dstOpts = [...new Set(d.map(r=>r.dest))];
  if(DATA.bsa) {
    let b = DATA.bsa;
    if(team!=='ALL') b=b.filter(r=>r.team===team);
    if(ori!=='ALL') b=b.filter(r=>r.origin===ori);
    if(oriP!=='ALL') b=b.filter(r=>r.POR_PORT===oriP);
    const bsaDests = [...new Set(b.map(r=>r.dest))];
    dstOpts = [...new Set([...dstOpts, ...bsaDests])];
  }
  fillSelect('fDst', dstOpts.sort(), dst);
  if(dst!=='ALL') d=d.filter(r=>r.dest===dst);
  
  // 도착포트 옵션: Monthly + BSA 데이터 모두에서 추출
  let dstPOpts = [...new Set(d.map(r=>r.dst_port))];
  if(DATA.bsa) {
    let b = DATA.bsa;
    if(team!=='ALL') b=b.filter(r=>r.team===team);
    if(ori!=='ALL') b=b.filter(r=>r.origin===ori);
    if(oriP!=='ALL') b=b.filter(r=>r.POR_PORT===oriP);
    if(dst!=='ALL') b=b.filter(r=>r.dest===dst);
    const bsaDstPorts = [...new Set(b.map(r=>r.DLY_PORT))];
    dstPOpts = [...new Set([...dstPOpts, ...bsaDstPorts])];
  }
  fillSelect('fDstP', dstPOpts.sort(), dstP);
  
  // 영업사원 옵션 (shipper 데이터에서)
  if (DATA.shipper) {
    let sd = DATA.shipper;
    if(gv('fTeam')!=='ALL') sd=sd.filter(r=>r.team===gv('fTeam'));
    const salesList = [...new Set(sd.map(r=>r.Salesman_POR).filter(s=>s&&s!==''))].sort();
    fillSelect('fSales', salesList, sales);
  }
}

function updateWeekOpts() {
  const month = gv('fMonth');
  const weeks = [...new Set(DATA.weekly.filter(r=>r.YYYYMM===month).map(r=>r.week_start_date))].sort();
  const el = document.getElementById('fWeek');
  const cur = el.value;
  let opts = `<option value="ALL">${L('전체','All')}</option>`;
  weeks.forEach((w,i) => {
    const lbl = w.replace(/\D+/g,'-').replace(/-$/,'').slice(5);
    opts += `<option value="${w}">${i+1}${L('주차','wk')} (${lbl})</option>`;
  });
  el.innerHTML = opts;
  el.value = weeks.includes(cur) ? cur : 'ALL';
}

function applyGlobalFilter(d, isMonthly) {
  const team=gv('fTeam'),ori=gv('fOri'),dst=gv('fDst');
  if(team!=='ALL') d=d.filter(r=>r.team===team);
  if(ori!=='ALL') d=d.filter(r=>r.origin===ori);
  if(isMonthly) {
    const oriP=gv('fOriP'),dstP=gv('fDstP');
    if(oriP!=='ALL') d=d.filter(r=>r.ori_port===oriP);
    if(dst!=='ALL') d=d.filter(r=>r.dest===dst);
    if(dstP!=='ALL') d=d.filter(r=>r.dst_port===dstP);
  } else {
    if(dst!=='ALL') d=d.filter(r=>r.dest===dst);
  }
  return d;
}

// 영업사원 필터: shipper에서 해당 영업사원의 화주 코드 추출 → monthly/weekly 필터
function _getSalesShipperCodes() {
  const sales = gv('fSales');
  if (sales === 'ALL' || !DATA.shipper) return null;
  const codes = new Set(DATA.shipper.filter(r => r.Salesman_POR === sales).map(r => r.BKG_SHPR_CST_NO));
  return codes;
}

function filterMonthlyWithSales(month) {
  let d = filterMonthly(month);
  const codes = _getSalesShipperCodes();
  // monthly 데이터에는 BKG_SHPR_CST_NO가 없으므로 영업사원 필터 불가
  // → shipper 기반 뷰(Tab2 화주/영업사원)에서만 적용
  return d;
}

function filterMonthly(month) {
  let d = applyGlobalFilter([...DATA.monthly], true);
  if(month) d=d.filter(r=>r.YYYYMM===month);
  return d;
}

// week_start_date → WW 변환 (445 calendar)
function weekToWW(weekStr) {
  const m = weekStr.match(/(\d{1,2})\D+(\d{1,2})\D*$/);
  if (!m) return null;
  const mon = parseInt(m[1]), day = parseInt(m[2]);
  // 445: WW1=01/04, each +7 days
  const start = new Date(2026, 0, 4); // 2026-01-04
  const target = new Date(2026, mon-1, day);
  const diff = Math.round((target - start) / (7*86400000));
  return diff >= 0 ? String(diff + 1) : null;
}

function filterBSA(month, week) {
  let b = DATA.bsa;
  const team=gv('fTeam'),ori=gv('fOri'),oriP=gv('fOriP'),dst=gv('fDst'),dstP=gv('fDstP');
  if(team!=='ALL') b=b.filter(r=>r.team===team);
  if(ori!=='ALL') b=b.filter(r=>r.origin===ori);
  if(oriP!=='ALL') b=b.filter(r=>r.POR_PORT===oriP);
  if(dst!=='ALL') b=b.filter(r=>r.dest===dst);
  if(dstP!=='ALL') b=b.filter(r=>r.DLY_PORT===dstP);
  if(month) b=b.filter(r=>r.YYYYMM===month);
  // 주차 필터: week=null이면 전체 월, week=undefined이면 gv 사용
  const wk = week === null ? 'ALL' : (week !== undefined ? week : gv('fWeek'));
  if(wk && wk!=='ALL') {
    const ww = weekToWW(wk);
    if(ww) b=b.filter(r=>r.WW===ww);
  }
  return b;
}

function filterWeekly(month) {
  let d = applyGlobalFilter([...DATA.weekly], true);
  if(month) d=d.filter(r=>r.YYYYMM===month);
  const week = gv('fWeek');
  if(week!=='ALL') d=d.filter(r=>r.week_start_date===week);
  return d;
}

function filterShipper(month) {
  if (!DATA.shipper) return [];
  let d = applyGlobalFilter([...DATA.shipper], true);
  if(month) d=d.filter(r=>r.YYYYMM===month);
  const week = gv('fWeek');
  if(week!=='ALL' && d.length>0 && d[0].week_start_date) d=d.filter(r=>r.week_start_date===week);
  const sales = gv('fSales');
  if(sales!=='ALL') d=d.filter(r=>r.Salesman_POR===sales);
  const profit = gv('fProfit');
  if(profit==='hi') d=d.filter(r=>r['\uace0\uc218\uc775\ud0dc\uadf8']==='고수익화주');
  if(profit==='lo') d=d.filter(r=>r['\uace0\uc218\uc775\ud0dc\uadf8']==='저수익화주');
  const grade = gv('fGrade');
  if(grade==='ab') d=d.filter(r=>r.grade==='A+B');
  if(grade==='cd') d=d.filter(r=>r.grade==='C+D');
  return d;
}

// ═══════════════════════════════════════════════
// Aggregation helpers
// ═══════════════════════════════════════════════
function sum(arr, key) { return arr.reduce((s,r) => s + (r[key]||0), 0); }
function fmt(v) { return v.toLocaleString('ko-KR', {maximumFractionDigits:0}); }
function pct(a,b) { return b>0 ? `${(a/b*100).toFixed(0)}%` : '-'; }

function fmtWeekLabel(w) {
  // "2026년 01월 04일" or "2026-01-04" → "01/04"
  const m = w.match(/(\d{1,2})\D+(\d{1,2})\D*$/);
  return m ? `${m[1]}/${m[2]}` : w;
}
function viewKey() { return gv('fView') === 'origin' ? 'origin' : 'dest'; }
function viewLabel() { return gv('fView') === 'origin' ? L('선적지','Origin') : L('도착지','Dest'); }
function bsaViewKey() { return gv('fView') === 'origin' ? 'origin' : 'dest'; }
function tagLabel(t) { return (t||'').split(', ').map(v => v==='고수익화주'?L('고수익화주','High'):v==='저수익화주'?L('저수익화주','Low'):v).join(', '); }

// 화주구분 필터: 고수익/저수익에 따라 BKG/실선적 수치 조정
function profitSum(arr, key) {
  const p = gv('fProfit');
  if (p === 'ALL') return sum(arr, key);
  // w3_fst → hi면 w3_hi_fst, lo면 w3_fst - w3_hi_fst
  const mapping = {
    'w3_fst': ['w3_hi_fst', r=>(r.w3_fst||0)-(r.w3_hi_fst||0)],
    'w3_norm_lst': ['w3_hi_norm_lst', r=>(r.w3_norm_lst||0)-(r.w3_hi_norm_lst||0)],
    'w3_canc_fst': ['w3_hi_fst', r=>0],
    'fst': ['hi_fst', r=>(r.fst||0)-(r.hi_fst||0)],
    'norm_lst': ['hi_norm_lst', r=>(r.norm_lst||0)-(r.hi_norm_lst||0)],
  };
  if (mapping[key]) {
    if (p==='hi') return sum(arr, mapping[key][0]);
    if (p==='lo') return arr.reduce((s,r) => s + mapping[key][1](r), 0);
  }
  return sum(arr, key);
}

let activeTab = 't1';
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab===tab));
  render();
}

function render() {
  if (!DATA) return;
  const fn = {t1: renderTab1, t2: renderTab2, t3: renderTab3, t4: renderTab4, t5: renderTab5};
  fn[activeTab]();
}

// Tab 1: 소석률 현황
// ═══════════════════════════════════════════════
function renderTab1() {
  const month = gv('fMonth');
  const wk = DATA.wpm[month] || 4;

  const bsaTotal = _weekSel ? sum(filterBSA(month), 'teu_bsa') : sum(filterBSA(month, null), 'teu_bsa');

  const totalBkg = profitSum(fd,'fst'), shipped = profitSum(fd,'norm_lst');
  const w3Bkg = profitSum(fd,'w3_fst'), w3Ship = profitSum(fd,'w3_norm_lst');
  const occ = bsaTotal>0 ? shipped/bsaTotal*100 : 0;
  const sr = w3Bkg>0 ? w3Ship/w3Bkg*100 : 0;
  const cm1 = sum(fd,'cm1_norm'), cm1l = sum(fd,'lst_norm');
  const cm1teu = cm1l>0 ? cm1/cm1l : 0;

  let html = `<div class="row">
    ${kpi(T[_lang].totalBkg, fmt(totalBkg), '#1a73e8')}
    ${kpi(T[_lang].shipment, fmt(shipped), '#34a853')}
    ${kpi(T[_lang].w3bkg, fmt(w3Bkg), '#6c5ce7')}
    ${kpi(T[_lang].w3ship, fmt(w3Ship), '#00b894')}
    ${kpi(T[_lang].bsa, fmt(bsaTotal), '#5f6368')}
    ${kpi(T[_lang].occ, occ.toFixed(1)+'%', occ<=120?'#34a853':'#ea4335')}
    ${kpi(T[_lang].shipRate, sr.toFixed(1)+'%', sr>=55?'#34a853':'#f9ab00')}
    ${kpi('CM1/TEU', fmt(Math.round(cm1teu)), '#202124')}
  </div>`;

  // Charts
  html += `<div class="chart-row">
    <div class="chart-card" style="flex:7"><h3>${T[_lang].monthlyChart}</h3><div id="ch1bar" style="height:450px"></div></div>
    <div class="chart-card" style="flex:5">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h3 id="occTitle">${vl} ${L('3주전BKG/BSA','WOS-3 BKG/BSA')}</h3>
        <div style="display:flex;gap:4px">
          <button onclick="setOccMode('w3')" id="occBtnW3" style="padding:3px 8px;font-size:11px;border-radius:3px;cursor:pointer;border:1px solid #1a73e8;background:#1a73e8;color:#fff">${L('3주전BKG/BSA','WOS-3/BSA')}</button>
          <button onclick="setOccMode('normal')" id="occBtnN" style="padding:3px 8px;font-size:11px;border-radius:3px;cursor:pointer;border:1px solid #dadce0;background:#fff;color:#5f6368">Normal/BSA</button>
        </div>
      </div>
      <div class="sub">${fmtMonth(month)}</div><div id="ch1occ" style="height:430px"></div>
    </div>
  </div>`;

  // Summary table
  html += `<div class="chart-card"><h3>${vl} ${L('월간 실적','Monthly Performance')}</h3><div id="summaryTbl"></div></div>`;

  document.getElementById('tabContent').innerHTML = html;

  // Bar chart (주차 선택: 해당월=해당주 실적, 과거월=주평균, BSA=항상 주평균)
  const ms = DATA.months.filter(m => m <= month);
  const isWeekSelected = gv('fWeek') !== 'ALL';

  // 데이터 소스: 해당월은 weekly(해당주), 과거월은 monthly/주수
  function _getMonthData(m, key) {
    if (isWeekSelected && m === month) {
      // 해당월: weekly 데이터 (해당 주만)
      return profitSum(filterWeekly(m), key);
    } else if (isWeekSelected) {
      // 과거월: monthly / 주수 (주평균)
      return profitSum(filterMonthly(m), key) / (DATA.wpm[m]||4);
    } else {
      return profitSum(filterMonthly(m), key);
    }
  }
  function _getMonthMetric(m, key) {
    if (isWeekSelected && m === month) {
      return sum(filterWeekly(m), key);
    }
    const v = sum(filterMonthly(m), key);
    return isWeekSelected ? v / (DATA.wpm[m]||4) : v;
  }
  function _getBSA(m) {
    if (isWeekSelected && m === month) {
      return sum(filterBSA(m), 'teu_bsa');  // 해당월: 해당 주 BSA
    }
    const v = sum(filterBSA(m, null), 'teu_bsa');
    return isWeekSelected ? v / (DATA.wpm[m]||4) : v;  // 과거월: 주평균
  }

  const shipM = ms.map(m => _getMonthData(m, 'norm_lst'));
  const bsaM = ms.map(m => _getBSA(m));
  const occM = ms.map((m,i) => bsaM[i]>0 ? shipM[i]/bsaM[i]*100 : null);
  const xl = ms.map(fmtMonth);

  // 3주전 BKG 바 + 3주전BKG/BSA 라인 + 고수익화주부킹비중(w3_hi_fst/w3_fst)
  const w3bkgM = ms.map(m => _getMonthData(m, 'w3_fst'));
  const w3bkgBsaM = ms.map((m,i) => bsaM[i]>0 ? w3bkgM[i]/bsaM[i]*100 : null);
  const w3TotalBkgM = ms.map(m => _getMonthMetric(m, 'w3_fst'));
  const w3HiBkgM = ms.map(m => _getMonthMetric(m, 'w3_hi_fst'));
  const hiBkgShareM = ms.map((m,i) => w3TotalBkgM[i]>0 ? w3HiBkgM[i]/w3TotalBkgM[i]*100 : null);

  // --- 월별 BKG vs BSA: smart label positioning (2D overlap) ---
  const _axisRange = (vals, fallbackMax, minSpanRatio, lowPad, highPad) => {
    const clean = vals.filter(v=>Number.isFinite(v) && v>0);
    if (!clean.length) return [0, fallbackMax];
    const mn = Math.min(...clean), mx = Math.max(...clean);
    const span = Math.max(mx - mn, mx * minSpanRatio, 1);
    return [Math.max(0, mn - span * lowPad), mx + span * highPad];
  };
  const _allBV = [...shipM, ...bsaM, ...w3bkgM];
  const [_y1min, _y1m] = _axisRange(_allBV, 1000, 0.12, 0.12, 0.22);
  const _allOV = [...occM, ...hiBkgShareM, ...w3bkgBsaM].filter(v=>v!=null);
  const [_y2min, _y2m] = _axisRange(_allOV, 100, 0.22, 0.18, 0.22);
  const _ny1 = v => (_y1m === _y1min ? 0 : (v - _y1min) / (_y1m - _y1min));
  const _ny2 = v => (_y2m === _y2min ? 0 : (v - _y2min) / (_y2m - _y2min));
  const _G=0.07, _oP=[], _wbP=[], _woP=[];
  xl.forEach((_,i) => {
    const bTops=[w3bkgM[i],shipM[i],bsaM[i]].filter(v=>v>0).map(v=>_ny1(v)+0.03);
    const ents=[
      {yn:occM[i]!=null?_ny2(occM[i]):null,def:'top',idx:0},
      {yn:w3bkgBsaM[i]!=null?_ny2(w3bkgBsaM[i]):null,def:'top',idx:1},
      {yn:hiBkgShareM[i]!=null?_ny2(hiBkgShareM[i]):null,def:'bottom',idx:2}];
    const res=['top center','top center','bottom center'];
    const cP=[...bTops], rP=[];  // center-placed vs right-placed (separate columns)
    const noC=(y)=>!cP.some(p=>Math.abs(y-p)<_G);
    const noR=(y)=>!rP.some(p=>Math.abs(y-p)<_G);
    ents.filter(e=>e.yn!=null).sort((a,b)=>b.yn-a.yn).forEach(e=>{
      const td=e.def==='top'?0.04:-0.04, od=-td;
      if(noC(e.yn+td)){res[e.idx]=e.def+' center';cP.push(e.yn+td);}
      else if(noC(e.yn+od)){res[e.idx]=(e.def==='top'?'bottom':'top')+' center';cP.push(e.yn+od);}
      else if(noR(e.yn)){res[e.idx]='middle right';rP.push(e.yn);}
      else {res[e.idx]='middle left';}
    });
    _oP.push(res[0]); _wbP.push(res[1]); _woP.push(res[2]);
  });
  Plotly.newPlot('ch1bar', [
    {x:xl, y:w3bkgM, type:'bar', name:L('3주전BKG','WOS-3 BKG'), marker:{color:'#6c5ce7',opacity:.7}, text:w3bkgM.map(fmt), textposition:'outside', textfont:{size:9}},
    {x:xl, y:shipM, type:'bar', name:L('실선적(Normal)','LFT(Normal)'), marker:{color:'#1a73e8',opacity:.85}, text:shipM.map(fmt), textposition:'outside', textfont:{size:10}},
    {x:xl, y:bsaM, type:'bar', name:'BSA', marker:{color:'#dadce0',opacity:.5}, text:bsaM.map(fmt), textposition:'outside', textfont:{size:10}},
    {x:xl, y:occM, type:'scatter', mode:'lines+markers+text', name:L('소석률(Normal/BSA)','Occ(Normal/BSA)'), yaxis:'y2',
     text:occM.map(v=>v?v.toFixed(0)+'%':''), textposition:_oP, line:{color:'#ea4335',width:2}, marker:{size:8}},
    {x:xl, y:w3bkgBsaM, type:'scatter', mode:'lines+markers+text', name:L('3주전BKG/BSA','WOS-3 BKG/BSA'), yaxis:'y2',
     text:w3bkgBsaM.map(v=>v?v.toFixed(0)+'%':''), textposition:_wbP, line:{color:'#f9ab00',width:2,dash:'dot'}, marker:{size:6,symbol:'square'}},
    {x:xl, y:hiBkgShareM, type:'scatter', mode:'lines+markers+text', name:L('고수익화주부킹비중','Hi-Shipper WOS-3 BKG Share'), yaxis:'y2',
     text:hiBkgShareM.map(v=>v?v.toFixed(0)+'%':''), textposition:_woP, line:{color:'#6c5ce7',width:2,dash:'dash'}, marker:{size:6,symbol:'diamond'}},
  ], {barmode:'group', margin:{l:50,r:50,t:40,b:30},
    yaxis:{title:'TEU',gridcolor:'#f0f0f0',range:[_y1min,_y1m]},
    yaxis2:{title:L('비율 %','Ratio %'),overlaying:'y',side:'right',range:[_y2min,_y2m]},
    legend:{orientation:'h',y:1.15}, plot_bgcolor:'#fff', paper_bgcolor:'#fff'},
  {displayModeBar:false});

  // Occupancy bar
  const items = groupByKey(fd, vk);
  // 주차 선택: 해당 주 BSA, 전체: 월 BSA
  const _bsaForOcc = _weekSel ? filterBSA(month) : filterBSA(month, null);
  const bsaByKey = {};
  _bsaForOcc.forEach(r => { const k = r[bk]; bsaByKey[k] = (bsaByKey[k]||0) + (r.teu_bsa||0); });
  // Occ data for mode switching (w3=3주전BKG/BSA, normal=Normal/BSA)
  window._occRows = Object.entries(items).map(([k,rows]) => {
    const s = profitSum(rows,'norm_lst'), b = bsaByKey[k]||0;
    const w3b = profitSum(rows,'w3_fst');
    return {name:k, ship:s, w3bkg:w3b, bsa:b, occ: b>0?s/b*100:0, w3ratio: b>0?w3b/b*100:0};
  }).filter(r=>r.ship>0||r.bsa>0);
  if (!window._occMode) window._occMode = 'w3';
  drawOccChart();

  // Summary table
  buildSummaryTable(ms.slice(-3));
}

function setOccMode(mode) {
  window._occMode = mode;
  // Update button styles
  const w3btn = document.getElementById('occBtnW3'), nbtn = document.getElementById('occBtnN');
  if (mode === 'w3') {
    w3btn.style.background='#1a73e8'; w3btn.style.color='#fff'; w3btn.style.borderColor='#1a73e8';
    nbtn.style.background='#fff'; nbtn.style.color='#5f6368'; nbtn.style.borderColor='#dadce0';
  } else {
    nbtn.style.background='#1a73e8'; nbtn.style.color='#fff'; nbtn.style.borderColor='#1a73e8';
    w3btn.style.background='#fff'; w3btn.style.color='#5f6368'; w3btn.style.borderColor='#dadce0';
  }
  const title = document.getElementById('occTitle');
  if (title) title.textContent = mode === 'w3' ? L('3주전BKG/BSA','WOS-3 BKG/BSA') : L('소석률(Normal/BSA)','Occ(Normal/BSA)');
  drawOccChart();
}

function drawOccChart() {
  const rows = window._occRows;
  if (!rows || !rows.length) return;
  const mode = window._occMode || 'w3';
  const sorted = [...rows].sort((a,b) => mode==='w3' ? a.w3ratio-b.w3ratio : a.occ-b.occ);
  const vals = sorted.map(r => mode==='w3' ? r.w3ratio : r.occ);
  const labels = sorted.map(r => {
    const num = mode==='w3' ? r.w3bkg : r.ship;
    return `(${fmt(num)} / ${fmt(r.bsa)})  ${r.name}`;
  });
  Plotly.newPlot('ch1occ', [{
    y: labels, x: vals, type:'bar', orientation:'h',
    marker:{color:vals.map(v => v>=65?'#34a853':v>=50?'#f9ab00':'#ea4335')},
    text:vals.map(v=>v.toFixed(0)+'%'), textposition:'outside', textfont:{size:11}, cliponaxis:false
  }], {margin:{l:200,r:60,t:10,b:30},
    xaxis:{gridcolor:'#f0f0f0'},
    yaxis:{tickfont:{family:'Consolas,monospace',size:11}},
    plot_bgcolor:'#fff',paper_bgcolor:'#fff',showlegend:false,
    shapes:[{type:'line',x0:50,x1:50,y0:-0.5,y1:sorted.length-0.5,line:{dash:'dot',color:'#5f6368',width:1}}]
  }, {displayModeBar:false});
}

function kpi(label, value, color) {
  return `<div class="card"><div class="label">${label}</div><div class="value" style="color:${color}">${value}</div></div>`;
}

function groupByKey(arr, key) {
  const g = {};
  arr.forEach(r => { const k = r[key]; (g[k]=g[k]||[]).push(r); });
  return g;
}

function buildSummaryTable(months) {
  const vk = viewKey(), vl = viewLabel(), bk = bsaViewKey();
  const allFd = filterMonthly(null);
  const items = [...new Set(allFd.map(r=>r[vk]))].sort((a,b) => {
    const sa = sum(allFd.filter(r=>r[vk]===a),'w3_fst'), sb = sum(allFd.filter(r=>r[vk]===b),'w3_fst');
    return sb - sa;
  }).slice(0, 15);

  const _ws = gv('fWeek') !== 'ALL';
  const _curMonth = gv('fMonth');
  const _selWeek = gv('fWeek');
  let h = `<table class="summary"><tr><th rowspan="3">${vl}</th>`;
  months.forEach(m => {
    const wk = DATA.wpm[m]||4;
    if (_ws && m === _curMonth) {
      const mWeeks = [...new Set(DATA.weekly.filter(r=>r.YYYYMM===m).map(r=>r.week_start_date))].sort();
      const wkIdx = mWeeks.indexOf(_selWeek) + 1;
      h += `<th colspan="11">${fmtMonth(m)} ${L('실적','Perf')} (${wkIdx}${L('주차','wk')})</th>`;
    } else if (_ws) {
      h += `<th colspan="11">${fmtMonth(m)} ${L('실적','Perf')} (${L('주평균','Wk Avg')})</th>`;
    } else {
      h += `<th colspan="11">${fmtMonth(m)} ${L('실적','Perf')} (${wk}${L('주','wk')})</th>`;
    }
  });
  h += '</tr><tr>';
  months.forEach(() => {
    h += `<th colspan="5">${L('3주전 BKG (물량 및 실선적률)','WOS-3 BKG (Volume & LFT Rate)')}</th><th colspan="6">${L('3주전 BKG (고수익화주)','WOS-3 BKG (Hi-Shipper)')}</th>`;
  });
  h += '</tr><tr>';
  months.forEach(() => {
    h += `<th>BKG</th><th>BSA</th><th>${L('비중','Ratio')}</th><th>${L('실선적','LFT')}</th><th>${L('실선적률','Rate')}</th><th>BKG</th><th>${L('비중','Ratio')}</th><th>${L('실선적','LFT')}</th><th>${L('실선적률','Rate')}</th><th>CM1</th><th>CM1/TEU</th>`;
  });
  h += '</tr>';

  // 주차 선택: 해당월=해당주, 과거월=주평균, BSA=해당주/주평균
  function _tblData(m, key, byItem) {
    if (_ws && m === _curMonth) {
      // 선택된 주차: 해당 주 실적
      const d = filterWeekly(m);
      return byItem ? sum(d.filter(r=>r[vk]===byItem), key) : sum(d, key);
    }
    const d = filterMonthly(m);
    const v = byItem ? sum(d.filter(r=>r[vk]===byItem), key) : sum(d, key);
    // 주차 선택 시 과거월은 주평균, 미선택 시 월합계
    return _ws ? v / (DATA.wpm[m]||4) : v;
  }
  function _tblBSA(m, byItem) {
    if (_ws && m === _curMonth) {
      // 선택된 주차: 해당 주 BSA
      let b = filterBSA(m);
      if (byItem) b = b.filter(r=>r[bk]===byItem);
      return sum(b, 'teu_bsa');
    }
    let b = filterBSA(m, null);
    if (byItem) b = b.filter(r=>r[bk]===byItem);
    // 주차 선택 시 과거월은 주평균, 미선택 시 월합계
    return _ws ? sum(b, 'teu_bsa') / (DATA.wpm[m]||4) : sum(b, 'teu_bsa');
  }

  items.forEach(it => {
    h += `<tr><td class="lbl">${it}</td>`;
    months.forEach(m => {
      const b=_tblData(m,'w3_fst',it), n=_tblData(m,'w3_norm_lst',it);
      const hb=_tblData(m,'w3_hi_fst',it), hn=_tblData(m,'w3_hi_norm_lst',it);
      const c1=_tblData(m,'w3_hi_cm1_norm',it), cl=_tblData(m,'w3_hi_norm_lst',it), ct=cl>0?c1/cl:0;
      const bsa_v=_tblBSA(m,it);
      h += `<td>${fmt(Math.round(b))}</td><td>${fmt(Math.round(bsa_v))}</td><td>${pct(b,bsa_v)}</td><td>${fmt(Math.round(n))}</td><td>${pct(n,b)}</td>`;
      h += `<td>${fmt(Math.round(hb))}</td><td>${pct(hb,b)}</td><td>${fmt(Math.round(hn))}</td><td>${pct(hn,hb)}</td>`;
      h += `<td>${fmt(Math.round(c1))}</td><td>${fmt(Math.round(ct))}</td>`;
    });
    h += '</tr>';
  });

  // Totals: 주차 선택 시 합계(주)=합계(월) 동일
  const _totalLabels = _ws
    ? [L('합계','Total'), L('합계','Total')]  // 주차 선택: 동일
    : [L('합계(주)','Total(Wk)'), L('합계(월)','Total(Mo)')];
  _totalLabels.forEach((lbl,ti) => {
    if (_ws && ti === 1) return;  // 주차 선택 시 합계 1행만
    h += `<tr class="${ti===0?'total':'total-m'}"><td class="lbl">${lbl}</td>`;
    months.forEach(m => {
      const isMonthlyTotal = ti === 1 && !_ws;
      const b = isMonthlyTotal ? sum(filterMonthly(m),'w3_fst') : _tblData(m,'w3_fst');
      const n = isMonthlyTotal ? sum(filterMonthly(m),'w3_norm_lst') : _tblData(m,'w3_norm_lst');
      const hb = isMonthlyTotal ? sum(filterMonthly(m),'w3_hi_fst') : _tblData(m,'w3_hi_fst');
      const hn = isMonthlyTotal ? sum(filterMonthly(m),'w3_hi_norm_lst') : _tblData(m,'w3_hi_norm_lst');
      const c1 = isMonthlyTotal ? sum(filterMonthly(m),'w3_hi_cm1_norm') : _tblData(m,'w3_hi_cm1_norm');
      const cl = isMonthlyTotal ? sum(filterMonthly(m),'w3_hi_norm_lst') : _tblData(m,'w3_hi_norm_lst');
      const ct = cl>0?c1/cl:0;
      const bsa_v = isMonthlyTotal ? sum(filterBSA(m,null),'teu_bsa') : _tblBSA(m);
      h += `<td>${fmt(Math.round(b))}</td><td>${fmt(Math.round(bsa_v))}</td><td>${pct(b,bsa_v)}</td><td>${fmt(Math.round(n))}</td><td>${pct(n,b)}</td>`;
      h += `<td>${fmt(Math.round(hb))}</td><td>${pct(hb,b)}</td><td>${fmt(Math.round(hn))}</td><td>${pct(hn,hb)}</td>`;
      h += `<td>${fmt(Math.round(c1))}</td><td>${fmt(Math.round(ct))}</td>`;
    });
    h += '</tr>';
  });

  h += '</table>';
  document.getElementById('summaryTbl').innerHTML = h;
}

function renderABCDTab(month) {
  const vk = viewKey(), vl = viewLabel();
  const week = gv('fWeek');
  const fd = week !== 'ALL' ? filterWeekly(month) : filterMonthly(month);
  const items = groupByKey(fd, vk);
  let rows = Object.entries(items).map(([k,arr]) => {
    const ab=sum(arr,'w3_ab_fst'), cd=sum(arr,'w3_cd_fst'),
          abN=sum(arr,'w3_ab_norm_lst'), cdN=sum(arr,'w3_cd_norm_lst'), tot=ab+cd;
    return {name:k, ab, cd, abN, cdN, tot};
  }).filter(r=>r.tot>0).sort((a,b)=>b.tot-a.tot).slice(0,15);

  let h = `<div class="chart-card"><h3>AB vs CD ${L('등급별 3주전 BKG','Grade WOS-3 BKG')} - ${vl} (${fmtMonth(month)})</h3>
  <table class="summary"><tr><th>${vl}</th><th>A+B BKG</th><th>C+D BKG</th><th>A+B %</th><th>C+D %</th><th>A+B ${L('실선적률','LFT Rate')}</th><th>C+D ${L('실선적률','LFT Rate')}</th><th>${L('전체','Total')} BKG</th></tr>`;
  rows.forEach(r => {
    h += `<tr><td class="lbl">${r.name}</td><td>${fmt(r.ab)}</td><td>${fmt(r.cd)}</td>`;
    h += `<td>${pct(r.ab,r.tot)}</td><td>${pct(r.cd,r.tot)}</td>`;
    h += `<td>${pct(r.abN,r.ab)}</td><td>${pct(r.cdN,r.cd)}</td><td>${fmt(r.tot)}</td></tr>`;
  });
  const tAB=rows.reduce((s,r)=>s+r.ab,0), tCD=rows.reduce((s,r)=>s+r.cd,0),
        tABN=rows.reduce((s,r)=>s+r.abN,0), tCDN=rows.reduce((s,r)=>s+r.cdN,0), tTot=tAB+tCD;
  h += `<tr class="total"><td class="lbl">${L('합계','Total')}</td><td>${fmt(tAB)}</td><td>${fmt(tCD)}</td>`;
  h += `<td>${pct(tAB,tTot)}</td><td>${pct(tCD,tTot)}</td>`;
  h += `<td>${pct(tABN,tAB)}</td><td>${pct(tCDN,tCD)}</td><td>${fmt(tTot)}</td></tr></table></div>`;

  // Chart
  h += `<div class="chart-card"><h3>${vl}${L('별 A+B vs C+D',' A+B vs C+D')}</h3><div id="ch2abcd" style="height:290px"></div></div>`;

  // Analysis Guide
  const abPct = tTot>0 ? tAB/tTot*100 : 0;
  const abLft = tAB>0 ? tABN/tAB*100 : 0;
  const cdLft = tCD>0 ? tCDN/tCD*100 : 0;
  const gap = abLft - cdLft;
  let tips = [];
  if (abPct >= 60) tips.push(`<li><b>A+B ${L('의존도 높음','Dependency High')}:</b> ${L('전체 BKG의','Total BKG')} ${abPct.toFixed(0)}%${L('가 A+B 등급. 대형화주 집중 리스크 — 특정 화주 이탈 시 영향 큼.',' is A+B grade. Large shipper concentration risk.')}</li>`);
  else if (abPct <= 30) tips.push(`<li><b>C+D ${L('비중 높음','Share High')}:</b> ${L('전체 BKG의','Total BKG')} ${(100-abPct).toFixed(0)}%${L('가 C+D 등급. 중소화주 기반이 넓어 안정적이나, C+D 실선적률 관리 필요.',' is C+D grade. Stable SME base but needs C+D LFT rate management.')}</li>`);
  if (gap > 10) tips.push(`<li><b>${L('실선적률 격차 주의','LFT Rate Gap')}:</b> A+B ${abLft.toFixed(0)}% vs C+D ${cdLft.toFixed(0)}% (${L('차이','gap')} ${gap.toFixed(0)}%p). ${L('C+D 캔슬률이 높음 — 부킹 확정 관리 강화 필요.','C+D cancel rate is high — strengthen booking confirmation.')}</li>`);
  else if (gap < -5) tips.push(`<li><b>A+B ${L('실선적률 하락','LFT Rate Drop')}:</b> A+B ${abLft.toFixed(0)}% vs C+D ${cdLft.toFixed(0)}%. ${L('대형화주 부킹 변동이 크므로 선복 조정 주의.','Large shipper booking volatility — adjust capacity carefully.')}</li>`);
  // Regional skew
  if (rows.length >= 2) {
    const topAB = rows.reduce((a,b) => (b.tot>0&&b.ab/b.tot>a.ab/(a.tot||1)) ? b : a, rows[0]);
    const lowAB = rows.reduce((a,b) => (b.tot>0&&b.ab/b.tot<a.ab/(a.tot||1)) ? b : a, rows[0]);
    const topR = topAB.tot>0?topAB.ab/topAB.tot*100:0, lowR = lowAB.tot>0?lowAB.ab/lowAB.tot*100:0;
    if (topR - lowR > 30) tips.push(`<li><b>${L('지역별 편차 큼','Regional Skew')}:</b> ${topAB.name} A+B ${topR.toFixed(0)}% vs ${lowAB.name} A+B ${lowR.toFixed(0)}%. ${L('지역별 차별 전략 필요.','Different strategies needed per region.')}</li>`);
  }
  if (!tips.length) tips.push(`<li>${L('등급별 비중 및 실선적률이 균형 잡힌 상태입니다.','Grade distribution and LFT rates are balanced.')}</li>`);
  h += `<div style="background:#e8f0fe;border-left:4px solid #1a73e8;padding:12px 16px;border-radius:0 4px 4px 0;margin-top:12px">
    <h4 style="color:#1a73e8;margin:0 0 8px;font-size:14px">Analysis Guide</h4>
    <ul style="font-size:13px;line-height:1.8;color:#333;margin:0 0 0 16px">${tips.join('')}</ul></div>`;
  return h;
}

function renderShipperTable(month) {
  const sd = filterShipper(month);
  const wk = DATA.wpm[month]||4;

  // Aggregate by shipper + salesman
  const byShpr = {};
  sd.forEach(r => {
    const k = r.BKG_SHPR_CST_ENM || r.BKG_SHPR_CST_NO;
    if (!byShpr[k]) byShpr[k] = {bkg:0,ship:0,hi:0,hi_ship:0,cm1:0,cm1l:0,_sales:new Set(),_tags:new Set(),_grades:new Set()};
    const s = byShpr[k];
    s.bkg += r.w3_fst||0; s.ship += r.w3_norm_lst||0;
    s.hi += r.w3_hi_fst||0; s.hi_ship += r.w3_hi_norm_lst||0;
    s.cm1 += r.w3_cm1_norm||0; s.cm1l += r.w3_norm_lst||0;
    if (r.Salesman_POR) s._sales.add(r.Salesman_POR);
    if (r['\uace0\uc218\uc775\ud0dc\uadf8']) s._tags.add(r['\uace0\uc218\uc775\ud0dc\uadf8']);
    if (r.grade) s._grades.add(r.grade);
  });

  let rows = Object.entries(byShpr).map(([k,s]) => {
    const sales = [...s._sales].join(', ');
    const tag = [...s._tags].join(', ');
    const grade = [...s._grades].join(', ');
    return {name:k, grade, tag, sales, bkg:s.bkg, ship:s.ship, hi:s.hi, hi_ship:s.hi_ship, cm1:s.cm1, cm1l:s.cm1l};
  }).sort((a,b)=>b.bkg-a.bkg);

  let h = `<div class="chart-card"><h3>${L('화주별 3주전 BKG','WOS-3 BKG by Shipper')} (${fmtMonth(month)})</h3>
  <table class="summary"><tr><th>${L('화주','Shipper')}</th><th>${L('등급','Grade')}</th><th>${L('고수익화주','Hi-Shipper')}</th><th>${L('영업사원','Salesperson')}</th><th>BKG</th><th>${L('실선적','LFT')}</th><th>${L('실선적률','Rate')}</th><th>${L('구간별고수익','Route Hi')}</th><th>${L('구간별고수익%','Route Hi%')}</th><th>CM1</th><th>CM1/TEU</th></tr>`;

  rows.forEach(r => {
    const ct = r.cm1l>0 ? r.cm1/r.cm1l : 0;
    const tagStyle = r.tag==='고수익화주' ? 'color:#34a853;font-weight:600' : r.tag==='저수익화주' ? 'color:#ea4335' : '';
    const gradeStyle = r.grade==='A+B' ? 'color:#1a73e8;font-weight:600' : 'color:#f9ab00';
    h += `<tr><td class="lbl">${r.name}</td><td style="${gradeStyle}">${r.grade}</td><td style="${tagStyle}">${tagLabel(r.tag)}</td><td>${r.sales}</td><td>${fmt(r.bkg)}</td><td>${fmt(r.ship)}</td><td>${pct(r.ship,r.bkg)}</td>`;
    h += `<td>${fmt(r.hi)}</td><td>${pct(r.hi,r.bkg)}</td><td>${fmt(Math.round(r.cm1))}</td><td>${fmt(Math.round(ct))}</td></tr>`;
  });

  const tb=rows.reduce((s,r)=>s+r.bkg,0), ts=rows.reduce((s,r)=>s+r.ship,0);
  const th2=rows.reduce((s,r)=>s+r.hi,0), tc=rows.reduce((s,r)=>s+r.cm1,0);
  const tl=rows.reduce((s,r)=>s+r.cm1l,0), tct=tl>0?tc/tl:0;
  h += `<tr class="total"><td class="lbl">${L('합계','Total')}</td><td></td><td></td><td></td><td>${fmt(tb)}</td><td>${fmt(ts)}</td><td>${pct(ts,tb)}</td>`;
  h += `<td>${fmt(th2)}</td><td>${pct(th2,tb)}</td><td>${fmt(Math.round(tc))}</td><td>${fmt(Math.round(tct))}</td></tr>`;
  h += '</table></div>';
  return h;
}

function renderSalesmanTable(month) {

  });

  const th2=rows.reduce((s,r)=>s+r.hi,0), tc=rows.reduce((s,r)=>s+r.cm1,0);
  const tl=rows.reduce((s,r)=>s+r.cm1l,0), tct=tl>0?tc/tl:0;
  const tcust = new Set(sd.map(r=>r.BKG_SHPR_CST_NO).filter(v=>v)).size;
  h += `<tr class="total"><td class="lbl">${L('합계','Total')}</td><td>${tcust}</td><td>${fmt(tb)}</td><td>${fmt(ts)}</td><td>${pct(ts,tb)}</td>`;
  h += `<td>${fmt(th2)}</td><td>${pct(th2,tb)}</td><td>${fmt(Math.round(tc))}</td><td>${fmt(Math.round(tct))}</td></tr>`;
  h += '</table></div>';

  // Salesman bar chart
  h += `<div class="chart-card"><h3>${L('영업사원별 BKG vs 실선적률','Salesperson BKG vs LFT Rate')}</h3><div id="ch2sm" style="height:350px"></div></div>`;
  return h;

function renderTab4() {

  Plotly.newPlot('ch4conc', [{
    x:concData.map(r=>r.x), y:concData.map(r=>r.y), mode:'lines+markers',

    text:concData.map(r=>r.y.toFixed(0)+'%'), textposition:'top center'

}

// ═══════════════════════════════════════════════
// ═══════════════════════════════════════════════
// Tab 5: 부킹 패턴 (WOS 단계별)
// ═══════════════════════════════════════════════
function renderTab5() {
  const month = gv('fMonth'), vk = viewKey(), vl = viewLabel();
  const week = gv('fWeek');
  // 주차 선택 시 weekly 데이터 사용, 전체면 monthly 사용
  const fd = week !== 'ALL' ? filterWeekly(month) : filterMonthly(month);
  const bk = bsaViewKey();
  const wosKeys = ['w3_fst','w2_fst','w1_fst','wos_fst'];
  const wosLabels = ['WOS-3','WOS-2','WOS-1','WOS'];

  // 1. 지역별 WOS 분포 테이블
  const items = groupByKey(fd, vk);
  let destRows = Object.entries(items).map(([k,r]) => {
    const total = r.reduce((s,x)=>(wosKeys.forEach(w=>s+=x[w]||0),s),0);
    return {name:k, total, w3:sum(r,'w3_fst'), w2:sum(r,'w2_fst')||0, w1:sum(r,'w1_fst')||0, wos:sum(r,'wos_fst')||0};
  }).sort((a,b)=>b.total-a.total).slice(0,15);

  let html = `<div class="chart-card"><h3>${vl} ${L('부킹 접수 시점 분석','Booking Timing')} (${fmtMonth(month)})</h3>
  <table class="summary"><tr><th>${vl}</th><th>${L('전체BKG','Total BKG')}</th><th>WOS-3</th><th>${L('비중','Ratio')}</th><th>WOS-2</th><th>${L('비중','Ratio')}</th><th>WOS-1</th><th>${L('비중','Ratio')}</th><th>WOS</th><th>${L('비중','Ratio')}</th></tr>`;
  destRows.forEach(r => {
    html += `<tr><td class="lbl">${r.name}</td><td>${fmt(r.total)}</td>`;
    html += `<td>${fmt(r.w3)}</td><td>${pct(r.w3,r.total)}</td>`;
    html += `<td>${fmt(r.w2)}</td><td>${pct(r.w2,r.total)}</td>`;
    html += `<td>${fmt(r.w1)}</td><td>${pct(r.w1,r.total)}</td>`;
    html += `<td>${fmt(r.wos)}</td><td>${pct(r.wos,r.total)}</td></tr>`;
  });
  const tt=destRows.reduce((s,r)=>s+r.total,0), tw3=destRows.reduce((s,r)=>s+r.w3,0);
  const tw2=destRows.reduce((s,r)=>s+r.w2,0), tw1=destRows.reduce((s,r)=>s+r.w1,0), twos=destRows.reduce((s,r)=>s+r.wos,0);
  html += `<tr class="total"><td class="lbl">${L('합계','Total')}</td><td>${fmt(tt)}</td><td>${fmt(tw3)}</td><td>${pct(tw3,tt)}</td><td>${fmt(tw2)}</td><td>${pct(tw2,tt)}</td><td>${fmt(tw1)}</td><td>${pct(tw1,tt)}</td><td>${fmt(twos)}</td><td>${pct(twos,tt)}</td></tr>`;
  html += '</table></div>';

  // 2. 지역별 WOS 비중 stacked bar chart
  html += `<div class="chart-card"><h3>${vl} ${L('부킹 시점 비중','Booking Timing Ratio')}</h3><div id="ch5wos" style="height:400px"></div></div>`;

  // 3. 업체별 WOS 분포
  const sd = filterShipper(month);
  const byShpr = {};
  sd.forEach(r => {
    const k = r.BKG_SHPR_CST_ENM || r.BKG_SHPR_CST_NO;
    if (!byShpr[k]) byShpr[k] = {w3:0,w2:0,w1:0,wos:0,sm:new Set(),tags:new Set()};
    const s = byShpr[k];
    s.w3 += r.w3_fst||0; s.w2 += r.w2_fst||0; s.w1 += r.w1_fst||0; s.wos += r.wos_fst||0;
    if (r.Salesman_POR) s.sm.add(r.Salesman_POR);
    if (r['\uace0\uc218\uc775\ud0dc\uadf8']) s.tags.add(r['\uace0\uc218\uc775\ud0dc\uadf8']);
  });
  let custRows = Object.entries(byShpr).map(([k,s]) => {
    const total = s.w3+s.w2+s.w1+s.wos;
    return {name:k, tag:[...s.tags].join(', '), sales:[...s.sm].join(', '), total, w3:s.w3, w2:s.w2, w1:s.w1, wos:s.wos};
  }).sort((a,b)=>b.total-a.total);

  html += `<div class="chart-card"><h3>${L('화주별 부킹 접수 시점','Shipper Booking Timing')} (${fmtMonth(month)})</h3>
  <table class="summary"><tr><th>${L('화주','Shipper')}</th><th>${L('고수익화주','Hi-Shipper')}</th><th>${L('영업사원','Sales')}</th><th>${L('전체BKG','Total')}</th><th>WOS-3</th><th>${L('비중','Ratio')}</th><th>WOS-2</th><th>${L('비중','Ratio')}</th><th>WOS-1</th><th>${L('비중','Ratio')}</th><th>WOS</th><th>${L('비중','Ratio')}</th></tr>`;
  custRows.forEach(r => {
    const tagStyle = r.tag==='고수익화주' ? 'color:#34a853;font-weight:600' : r.tag==='저수익화주' ? 'color:#ea4335' : '';
    html += `<tr><td class="lbl">${r.name}</td><td style="${tagStyle}">${tagLabel(r.tag)}</td><td>${r.sales}</td><td>${fmt(r.total)}</td>`;
    html += `<td>${fmt(r.w3)}</td><td>${pct(r.w3,r.total)}</td>`;
    html += `<td>${fmt(r.w2)}</td><td>${pct(r.w2,r.total)}</td>`;
    html += `<td>${fmt(r.w1)}</td><td>${pct(r.w1,r.total)}</td>`;
    html += `<td>${fmt(r.wos)}</td><td>${pct(r.wos,r.total)}</td></tr>`;
  });
  html += '</table></div>';

  // 4. 고수익 vs 저수익 리드타임 + 비중 추이
  html += `<div class="chart-row">
    <div class="chart-card" style="flex:1"><h3>${L('고수익화주 vs 저수익화주 리드타임','Hi vs Lo Shipper Lead Time')}</h3><div id="ch5lt" style="height:320px"></div></div>
    <div class="chart-card" style="flex:1"><h3>${L('고수익화주 WOS-3 비중 추이','High-Profit WOS-3 Ratio Trend')}</h3><div id="ch5hi" style="height:320px"></div></div>
  </div>`;

  document.getElementById('tabContent').innerHTML = html;

  // Render 100% stacked bar (지역별 비중)
  const colors = ['#1a73e8','#f9ab00','#ea4335','#5f6368'];
  const top10 = destRows.slice(0,10);
  Plotly.newPlot('ch5wos', wosLabels.map((lbl,i) => ({
    x: top10.map(r=>r.name),
    y: top10.map(r=> r.total>0 ? [r.w3,r.w2,r.w1,r.wos][i]/r.total*100 : 0),
    type:'bar', name:lbl, marker:{color:colors[i]},
    text: top10.map(r=> r.total>0 ? ([r.w3,r.w2,r.w1,r.wos][i]/r.total*100).toFixed(0)+'%' : ''),
    textposition:'inside', textfont:{size:10,color:'#fff'}, hovertemplate:'%{x}: %{y:.1f}%<extra>'+lbl+'</extra>'
  })), {barmode:'stack',margin:{l:40,r:20,t:20,b:30},
    yaxis:{title:L('비중 %','Ratio %'),gridcolor:'#f0f0f0',range:[0,100]},
    legend:{orientation:'h',y:1.1},plot_bgcolor:'#fff',paper_bgcolor:'#fff'}, {displayModeBar:false});

  // 고수익 vs 저수익 리드타임 비교
  const hiSD5 = sd.filter(r => r['\uace0\uc218\uc775\ud0dc\uadf8'] === '고수익화주');
  const loSD5 = sd.filter(r => r['\uace0\uc218\uc775\ud0dc\uadf8'] === '저수익화주');
  const hiT5 = wosKeys.reduce((s,k) => s + sum(hiSD5,k), 0);
  const loT5 = wosKeys.reduce((s,k) => s + sum(loSD5,k), 0);
  Plotly.newPlot('ch5lt', [
    {x:wosLabels, y:wosKeys.map(k => hiT5>0 ? sum(hiSD5,k)/hiT5*100 : 0), type:'bar',
     name:L('고수익화주','Hi-Shipper'), marker:{color:'#34a853'},
     text:wosKeys.map(k => hiT5>0 ? (sum(hiSD5,k)/hiT5*100).toFixed(0)+'%' : ''), textposition:'auto', textfont:{size:12}},
    {x:wosLabels, y:wosKeys.map(k => loT5>0 ? sum(loSD5,k)/loT5*100 : 0), type:'bar',
     name:L('저수익화주','Lo-Shipper'), marker:{color:'#ea4335'},
     text:wosKeys.map(k => loT5>0 ? (sum(loSD5,k)/loT5*100).toFixed(0)+'%' : ''), textposition:'auto', textfont:{size:12}},
  ], {barmode:'group',margin:{l:40,r:20,t:20,b:30},
    yaxis:{title:'%',gridcolor:'#f0f0f0',range:[0,100]},
    legend:{orientation:'h',y:1.1},plot_bgcolor:'#fff',paper_bgcolor:'#fff'}, {displayModeBar:false});

  // 고수익화주 WOS-3 비중 월별 추이
  const hiTrend5 = DATA.months.map(m => {
    const msd = filterShipper(m);
    if (!msd.length) return null;
    const total = sum(msd, 'w3_fst');
    const hi = sum(msd.filter(r => r['\uace0\uc218\uc775\ud0dc\uadf8'] === '고수익화주'), 'w3_fst');
    return total > 0 ? hi/total*100 : null;
  });
  Plotly.newPlot('ch5hi', [{
    x: DATA.months.map(fmtMonth), y: hiTrend5,
    mode:'lines+markers+text', line:{color:'#1a73e8',width:3}, marker:{size:8},
    text: hiTrend5.map(v => v !== null ? v.toFixed(0)+'%' : ''), textposition:'top center'
  }], {margin:{l:40,r:20,t:30,b:30},
    yaxis:{title:L('고수익 비중 %','High-Profit %'),gridcolor:'#f0f0f0',range:[0,100]},
    plot_bgcolor:'#fff',paper_bgcolor:'#fff',showlegend:false}, {displayModeBar:false});
}

// Quick translate helper
function L(ko, en) { return _lang === 'en' ? en : ko; }

function toggleLang() {
  _lang = _lang === 'ko' ? 'en' : 'ko';
  localStorage.setItem('lang', _lang);
  applyLang();
  if (DATA) render();
}

function applyLang() {
  const t = T[_lang];
  document.getElementById('langBtn').textContent = _lang === 'ko' ? 'EN' : 'KO';
  document.getElementById('guideLink').textContent = t.guide;
  // Filter labels
  document.querySelectorAll('.filters label').forEach((el, i) => {
    const keys = ['team','origin','oriPort','dest','dstPort','view','month','week','profitType','grade','sales'];
    if (keys[i]) el.textContent = t[keys[i]];
  });
  // Tab labels
  document.querySelectorAll('.tabs .tab').forEach((el, i) => {
    const keys = ['tab1','tab2','tab3','tab4','tab5'];
    if (keys[i]) el.textContent = t[keys[i]];
  });
  // View dropdown
  const vEl = document.getElementById('fView');
  if (vEl) { vEl.options[0].text = t.viewDest; vEl.options[1].text = t.viewOri; }
  // Profit dropdown
  const pEl = document.getElementById('fProfit');
  if (pEl && pEl.options.length >= 3) {
    pEl.options[0].text = t.all; pEl.options[1].text = t.hi; pEl.options[2].text = t.lo;
  }
  // All "전체" options in dropdowns
  ['fTeam','fOri','fOriP','fDst','fDstP','fWeek','fSales'].forEach(id => {
    const el = document.getElementById(id);
    if (el && el.options[0] && el.options[0].value === 'ALL') el.options[0].text = t.all;
  });
  // Login
  const loginP = document.querySelector('.login-box p');
  if (loginP) loginP.textContent = t.login;
  // User info (logout text)
  if (gUser) document.getElementById('userInfo').textContent = `${gUser.name} | ${_lang==='en'?'Logout':'로그아웃'}`;
  // Data date selector (latest label)
  const dSel = document.getElementById('dataDateSel');
  if (dSel && DATA) {
    const first = dSel.options[0];
    if (first && first.value === 'today') first.text = `${DATA.data_date} (${_lang==='en'?'Latest':'최신'})`;
  }
  // Month options (월 → English month names)
  if (DATA) {
    const mSel = document.getElementById('fMonth');
    if (mSel) {
      for (let i = 0; i < mSel.options.length; i++) {
        const o = mSel.options[i];
        if (o.value === 'ALL') { o.text = t.all; }
        else { o.text = fmtMonth(o.value); }
      }
    }
  }
}

// Init

applyLang();
checkSession();
